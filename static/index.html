<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Бац - заказ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 16px;
            background: #f8f9fa;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .location {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 4px;
        }
        .address {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .tariffs {
            display: flex;
            gap: 12px;
            margin: 16px 0;
        }
        .tariff {
            flex: 1;
            background: #f1f3f5;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tariff.selected {
            background: #ffde6e;
            border: 2px solid #f5a623;
        }
        .tariff-name {
            font-weight: bold;
            font-size: 16px;
        }
        .tariff-price {
            font-size: 14px;
            color: #495057;
            margin-top: 4px;
        }
        .order-btn {
            background: #ffcc00;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            color: #1a1a1a;
            cursor: pointer;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="location">📍 Откуда</div>
        <div class="address">Победа көшесі, 27/1</div>
    </div>

    <div class="card">
        <div class="location">🎯 Куда едем?</div>
        <input type="text" id="destination" placeholder="Введите адрес или выберите на карте">
    </div>

    <div class="tariffs">
        <div class="tariff selected" data-tariff="econom" data-price="400">
            <div class="tariff-name">🚙 Эконом</div>
            <div class="tariff-price">от 400 ₸</div>
        </div>
        <div class="tariff" data-tariff="comfort" data-price="600">
            <div class="tariff-name">🚘 Комфорт</div>
            <div class="tariff-price">от 600 ₸</div>
        </div>
        <div class="tariff" data-tariff="comfort_plus" data-price="800">
            <div class="tariff-name">✨ Комфорт+</div>
            <div class="tariff-price">от 800 ₸</div>
        </div>
    </div>

    <button class="order-btn" onclick="orderTaxi()">🚕 ЗАКАЗАТЬ</button>

    <script>
        let selectedTariff = "econom";
        let selectedPrice = 400;

        document.querySelectorAll(".tariff").forEach(tariff => {
            tariff.addEventListener("click", () => {
                document.querySelectorAll(".tariff").forEach(t => t.classList.remove("selected"));
                tariff.classList.add("selected");
                selectedTariff = tariff.dataset.tariff;
                selectedPrice = parseInt(tariff.dataset.price);
            });
        });

        function orderTaxi() {
            const destination = document.getElementById("destination").value;
            if (!destination) {
                alert("Введите адрес назначения");
                return;
            }

            const orderData = {
                action: "order",
                from: "Победа көшесі, 27/1",
                to: destination,
                tariff: selectedTariff,
                price: selectedPrice
            };

            Telegram.WebApp.sendData(JSON.stringify(orderData));
            Telegram.WebApp.close();
        }

        Telegram.WebApp.ready();
    </script>
</body>
</html>
